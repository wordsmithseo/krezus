name: Deploy Firebase Cloud Functions

on:
  push:
    branches:
      - main
    paths:
      - 'functions/**'

jobs:
  deploy:
    name: Deploy Cloud Functions
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: functions/package.json

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      - name: Setup gcloud CLI
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: krezus-e3070

      - name: Grant required IAM bindings for Cloud Functions v2
        run: |
          gcloud projects add-iam-policy-binding krezus-e3070 \
            --member=serviceAccount:service-972913558013@gcp-sa-pubsub.iam.gserviceaccount.com \
            --role=roles/iam.serviceAccountTokenCreator \
            --condition=None || true

          gcloud projects add-iam-policy-binding krezus-e3070 \
            --member=serviceAccount:972913558013-compute@developer.gserviceaccount.com \
            --role=roles/run.invoker \
            --condition=None || true

          gcloud projects add-iam-policy-binding krezus-e3070 \
            --member=serviceAccount:972913558013-compute@developer.gserviceaccount.com \
            --role=roles/eventarc.eventReceiver \
            --condition=None || true

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Install function dependencies
        working-directory: functions
        run: npm install

      - name: Deploy Cloud Functions
        run: firebase deploy --only functions --project krezus-e3070 --force
