<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Krezus — Redesign</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500;600&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<style>
  :root {
    /* Cream theme — default */
    --bg: #F6F2EA;
    --surface: #FFFFFF;
    --surface-2: #FBF7F0;
    --surface-sunken: #EFEADF;
    --ink-1: #1A1611;
    --ink-2: #524A40;
    --ink-3: #8C8275;
    --line: #E7DFD0;
    --line-strong: #D4C9B4;
    --accent: oklch(0.66 0.13 60);
    --accent-ink: #FFFFFF;
    --accent-soft: oklch(0.95 0.04 70);
    --success: oklch(0.55 0.12 155);
    --success-soft: oklch(0.94 0.05 155);
    --danger: oklch(0.58 0.17 25);
    --danger-soft: oklch(0.95 0.04 25);
    --info: oklch(0.6 0.1 245);
    --info-soft: oklch(0.95 0.03 245);

    --radius-sm: 8px;
    --radius: 14px;
    --radius-lg: 20px;
    --shadow-sm: 0 1px 2px rgba(33,25,10,0.04), 0 1px 1px rgba(33,25,10,0.02);
    --shadow: 0 1px 2px rgba(33,25,10,0.04), 0 4px 16px -8px rgba(33,25,10,0.08);
    --shadow-lg: 0 12px 40px -16px rgba(33,25,10,0.18), 0 1px 2px rgba(33,25,10,0.04);

    --font-sans: "Geist", ui-sans-serif, system-ui, -apple-system, sans-serif;
    --font-mono: "Geist Mono", ui-monospace, monospace;
    --font-serif: "Instrument Serif", "Times New Roman", serif;

    --density-pad: 20px;
    --density-row: 14px;
  }

  [data-theme="dark"] {
    --bg: #131110;
    --surface: #1C1A17;
    --surface-2: #232017;
    --surface-sunken: #0E0D0B;
    --ink-1: #F2EDE3;
    --ink-2: #B7AE9F;
    --ink-3: #7A7264;
    --line: #2A2620;
    --line-strong: #3A342B;
    --accent: oklch(0.74 0.13 70);
    --accent-ink: #1A1611;
    --accent-soft: oklch(0.32 0.05 70);
    --success-soft: oklch(0.3 0.05 155);
    --danger-soft: oklch(0.3 0.06 25);
    --info-soft: oklch(0.3 0.04 245);
    --shadow-sm: 0 1px 2px rgba(0,0,0,0.3);
    --shadow: 0 4px 16px -8px rgba(0,0,0,0.5);
    --shadow-lg: 0 12px 40px -16px rgba(0,0,0,0.6);
  }

  [data-density="compact"] {
    --density-pad: 14px;
    --density-row: 10px;
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: var(--font-sans);
    background: var(--bg);
    color: var(--ink-1);
    font-size: 14px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    font-feature-settings: "cv11" 1, "ss01" 1;
  }

  /* tabular nums for all monetary values */
  .num, .mono { font-family: var(--font-mono); font-feature-settings: "tnum" 1, "zero" 1; letter-spacing: -0.01em; }

  /* ====== App shell ====== */
  .app {
    display: grid;
    grid-template-columns: 256px 1fr;
    min-height: 100vh;
  }
  .sidebar {
    background: var(--surface-2);
    border-right: 1px solid var(--line);
    padding: 22px 16px;
    display: flex;
    flex-direction: column;
    gap: 6px;
    position: sticky;
    top: 0;
    height: 100vh;
    overflow-y: auto;
  }
  .brand {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 4px 8px 18px;
  }
  .brand-mark {
    width: 32px; height: 32px;
    border-radius: 8px;
    background: var(--ink-1);
    color: var(--bg);
    display: grid;
    place-items: center;
    font-family: var(--font-serif);
    font-style: italic;
    font-size: 22px;
    line-height: 1;
    font-weight: 400;
  }
  .brand-name {
    font-weight: 600;
    font-size: 16px;
    letter-spacing: -0.01em;
  }
  .brand-version {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--ink-3);
    margin-left: auto;
    padding: 2px 6px;
    border: 1px solid var(--line);
    border-radius: 4px;
  }
  .nav-section-label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--ink-3);
    font-weight: 600;
    padding: 14px 10px 6px;
  }
  .nav-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 10px;
    border-radius: 8px;
    color: var(--ink-2);
    cursor: pointer;
    border: none;
    background: transparent;
    width: 100%;
    text-align: left;
    font: inherit;
    font-weight: 500;
    transition: background 80ms, color 80ms;
  }
  .nav-item:hover { background: var(--surface-sunken); color: var(--ink-1); }
  .nav-item[aria-current="page"] {
    background: var(--surface);
    color: var(--ink-1);
    box-shadow: var(--shadow-sm);
  }
  .nav-item .icon {
    width: 16px; height: 16px;
    flex-shrink: 0;
    color: var(--ink-3);
  }
  .nav-item[aria-current="page"] .icon { color: var(--accent); }
  .nav-item .badge {
    margin-left: auto;
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--ink-3);
    background: var(--surface-sunken);
    padding: 1px 6px;
    border-radius: 4px;
  }
  .nav-item[aria-current="page"] .badge { background: var(--accent-soft); color: var(--accent); }

  .sidebar-footer {
    margin-top: auto;
    border-top: 1px solid var(--line);
    padding-top: 14px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .avatar {
    width: 32px; height: 32px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--accent) 0%, oklch(0.55 0.13 30) 100%);
    color: var(--accent-ink);
    display: grid;
    place-items: center;
    font-size: 12px;
    font-weight: 600;
    flex-shrink: 0;
  }
  .avatar.sm { width: 22px; height: 22px; font-size: 10px; }
  .user-meta { flex: 1; min-width: 0; }
  .user-name { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .user-email { font-size: 11px; color: var(--ink-3); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  /* ====== Main ====== */
  .main {
    min-width: 0;
    display: flex;
    flex-direction: column;
  }
  .topbar {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 16px 32px;
    border-bottom: 1px solid var(--line);
    background: color-mix(in srgb, var(--bg) 80%, transparent);
    backdrop-filter: blur(8px);
    position: sticky;
    top: 0;
    z-index: 10;
  }
  .topbar h1 {
    margin: 0;
    font-size: 18px;
    font-weight: 600;
    letter-spacing: -0.01em;
  }
  .topbar h1 .crumb { color: var(--ink-3); font-weight: 400; }
  .topbar-actions { margin-left: auto; display: flex; align-items: center; gap: 10px; }
  .presence {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: var(--ink-2);
    padding: 4px 10px 4px 8px;
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 999px;
  }
  .presence .pulse {
    width: 6px; height: 6px;
    background: var(--success);
    border-radius: 50%;
    position: relative;
  }
  .presence .pulse::after {
    content: "";
    position: absolute;
    inset: -3px;
    border-radius: 50%;
    border: 1px solid var(--success);
    opacity: 0.5;
    animation: pulse 2s ease-out infinite;
  }
  @keyframes pulse {
    0% { transform: scale(0.8); opacity: 0.6; }
    100% { transform: scale(2); opacity: 0; }
  }

  .content {
    padding: 28px 32px 80px;
    max-width: 1280px;
    width: 100%;
    margin: 0 auto;
  }

  /* ====== Cards ====== */
  .card {
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: var(--density-pad);
  }
  .card.flush { padding: 0; overflow: hidden; }
  .card-hd {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 16px;
  }
  .card-hd h3 {
    margin: 0;
    font-size: 14px;
    font-weight: 600;
    letter-spacing: -0.005em;
  }
  .card-hd .sub {
    font-size: 12px;
    color: var(--ink-3);
  }
  .card-hd-actions { margin-left: auto; display: flex; gap: 6px; }

  h2 { font-size: 22px; font-weight: 600; letter-spacing: -0.015em; margin: 0 0 4px; }
  h3 { font-size: 14px; font-weight: 600; letter-spacing: -0.005em; margin: 0; }
  .lead { color: var(--ink-2); margin: 0 0 24px; font-size: 14px; max-width: 64ch; }

  /* ====== Buttons ====== */
  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    padding: 8px 14px;
    border-radius: 8px;
    border: 1px solid var(--line-strong);
    background: var(--surface);
    color: var(--ink-1);
    font: inherit;
    font-weight: 500;
    cursor: pointer;
    transition: background 80ms, border-color 80ms, transform 80ms;
    white-space: nowrap;
  }
  .btn:hover { background: var(--surface-sunken); }
  .btn:active { transform: translateY(1px); }
  .btn.primary {
    background: var(--ink-1);
    color: var(--bg);
    border-color: var(--ink-1);
  }
  .btn.primary:hover { background: color-mix(in srgb, var(--ink-1) 90%, var(--bg)); }
  .btn.accent {
    background: var(--accent);
    color: var(--accent-ink);
    border-color: var(--accent);
  }
  .btn.ghost { background: transparent; border-color: transparent; color: var(--ink-2); }
  .btn.ghost:hover { background: var(--surface-sunken); color: var(--ink-1); }
  .btn.danger { color: var(--danger); border-color: color-mix(in srgb, var(--danger) 30%, var(--line)); }
  .btn.sm { padding: 5px 10px; font-size: 12px; }
  .btn.icon-only { padding: 6px; }
  .btn-row { display: flex; gap: 8px; flex-wrap: wrap; }

  /* ====== Inputs ====== */
  .input, .select, .textarea {
    width: 100%;
    padding: 9px 12px;
    background: var(--surface);
    border: 1px solid var(--line-strong);
    border-radius: 8px;
    color: var(--ink-1);
    font: inherit;
    font-size: 13px;
    transition: border-color 80ms, box-shadow 80ms;
  }
  .input:focus, .select:focus, .textarea:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-soft);
  }
  .input.mono { font-family: var(--font-mono); }
  .input.lg { padding: 12px 14px; font-size: 15px; }
  .field { display: flex; flex-direction: column; gap: 6px; }
  .field label { font-size: 12px; font-weight: 500; color: var(--ink-2); }
  .field .hint { font-size: 11px; color: var(--ink-3); }
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px 16px; }
  .form-grid.three { grid-template-columns: 1fr 1fr 1fr; }
  .form-grid > .full { grid-column: 1 / -1; }

  /* ====== Segmented ====== */
  .seg {
    display: inline-flex;
    background: var(--surface-sunken);
    padding: 3px;
    border-radius: 8px;
    gap: 2px;
  }
  .seg button {
    border: none;
    background: transparent;
    padding: 5px 12px;
    border-radius: 6px;
    font: inherit;
    font-size: 12px;
    font-weight: 500;
    color: var(--ink-2);
    cursor: pointer;
  }
  .seg button[aria-pressed="true"] {
    background: var(--surface);
    color: var(--ink-1);
    box-shadow: var(--shadow-sm);
  }

  /* ====== Stat ====== */
  .stat-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 14px;
  }
  .stat .label {
    font-size: 12px;
    color: var(--ink-3);
    font-weight: 500;
    margin-bottom: 6px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .stat .value {
    font-family: var(--font-mono);
    font-size: 26px;
    font-weight: 500;
    letter-spacing: -0.02em;
    line-height: 1.1;
    font-feature-settings: "tnum" 1;
  }
  .stat .value .unit {
    font-size: 13px;
    color: var(--ink-3);
    font-weight: 400;
    margin-left: 2px;
  }
  .stat .delta {
    font-size: 12px;
    margin-top: 4px;
    display: inline-flex;
    align-items: center;
    gap: 4px;
    color: var(--ink-3);
  }
  .delta.up { color: var(--danger); }
  .delta.down { color: var(--success); }
  .delta.up.good { color: var(--success); }
  .delta.down.bad { color: var(--danger); }

  /* ====== Tables ====== */
  table.table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }
  .table th {
    text-align: left;
    font-weight: 500;
    color: var(--ink-3);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    padding: 10px 14px;
    border-bottom: 1px solid var(--line);
    background: var(--surface-2);
  }
  .table td {
    padding: var(--density-row) 14px;
    border-bottom: 1px solid var(--line);
    vertical-align: middle;
  }
  .table tr:last-child td { border-bottom: none; }
  .table tr:hover td { background: var(--surface-2); }
  .table .amount { font-family: var(--font-mono); font-feature-settings: "tnum" 1; text-align: right; }
  .table .actions { width: 1px; text-align: right; white-space: nowrap; }
  .table .row-actions { display: inline-flex; gap: 2px; opacity: 0; transition: opacity 80ms; }
  .table tr:hover .row-actions { opacity: 1; }

  /* ====== Pills/Tags ====== */
  .tag {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 2px 8px;
    border-radius: 999px;
    font-size: 11px;
    font-weight: 500;
    background: var(--surface-sunken);
    color: var(--ink-2);
    border: 1px solid var(--line);
  }
  .tag.success { background: var(--success-soft); color: var(--success); border-color: transparent; }
  .tag.danger { background: var(--danger-soft); color: var(--danger); border-color: transparent; }
  .tag.info { background: var(--info-soft); color: var(--info); border-color: transparent; }
  .tag.accent { background: var(--accent-soft); color: var(--accent); border-color: transparent; }
  .tag.dot::before {
    content: "";
    width: 5px; height: 5px;
    background: currentColor;
    border-radius: 50%;
    flex-shrink: 0;
  }

  /* ====== Misc ====== */
  .divider { height: 1px; background: var(--line); margin: 24px 0; border: none; }
  .text-mute { color: var(--ink-3); }
  .text-sm { font-size: 12px; }
  .row { display: flex; gap: 12px; align-items: center; }
  .row.between { justify-content: space-between; }
  .col { display: flex; flex-direction: column; gap: 12px; }
  .grow { flex: 1; min-width: 0; }
  .hidden { display: none !important; }

  .gauge-ring { width: 200px; height: 200px; position: relative; }
  .gauge-ring svg { width: 100%; height: 100%; transform: rotate(-90deg); }
  .gauge-ring .track { stroke: var(--surface-sunken); }
  .gauge-ring .fill { stroke: var(--accent); transition: stroke-dashoffset 600ms cubic-bezier(.2,.8,.2,1), stroke 300ms; }
  .gauge-ring .center {
    position: absolute; inset: 0;
    display: grid; place-items: center;
    text-align: center;
  }

  .sparkline { width: 100%; height: 40px; display: block; }
  .sparkline path { fill: none; stroke: var(--accent); stroke-width: 1.5; }
  .sparkline .area { fill: var(--accent); opacity: 0.08; stroke: none; }

  .progress {
    height: 6px;
    background: var(--surface-sunken);
    border-radius: 999px;
    overflow: hidden;
  }
  .progress > div {
    height: 100%;
    background: var(--accent);
    border-radius: inherit;
    transition: width 400ms ease;
  }
  .progress.danger > div { background: var(--danger); }
  .progress.success > div { background: var(--success); }

  /* ====== Auth screen ====== */
  .auth-shell {
    min-height: 100vh;
    display: grid;
    grid-template-columns: 1fr 1fr;
  }
  .auth-side {
    background: var(--ink-1);
    color: var(--bg);
    padding: 48px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    position: relative;
    overflow: hidden;
  }
  .auth-side::before {
    content: "";
    position: absolute;
    right: -40%;
    top: -10%;
    width: 600px; height: 600px;
    background: radial-gradient(circle, var(--accent) 0%, transparent 60%);
    opacity: 0.25;
    pointer-events: none;
  }
  .auth-form-wrap {
    padding: 48px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    max-width: 480px;
    width: 100%;
    margin: 0 auto;
  }
  .auth-tagline {
    font-family: var(--font-serif);
    font-style: italic;
    font-size: 40px;
    line-height: 1.05;
    margin: 24px 0 16px;
    max-width: 18ch;
  }
  .auth-features { display: grid; grid-template-columns: 1fr 1fr; gap: 12px 24px; max-width: 480px; position: relative; }
  .auth-features .ft { display: flex; gap: 8px; align-items: flex-start; font-size: 13px; opacity: 0.85; }
  .auth-features .ft svg { width: 14px; height: 14px; flex-shrink: 0; margin-top: 3px; opacity: 0.7; }

  /* ====== Mobile menu (drawer) ====== */
  .mobile-menu-btn { display: none; }
  .sidebar-backdrop {
    display: none;
    position: fixed;
    inset: 0;
    background: color-mix(in srgb, var(--ink-1) 50%, transparent);
    backdrop-filter: blur(4px);
    z-index: 98;
    animation: backdropIn 200ms ease-out;
  }
  @keyframes backdropIn {
    from { opacity: 0; }
    to   { opacity: 1; }
  }
  @keyframes drawerIn {
    from { transform: translateX(-100%); }
    to   { transform: translateX(0); }
  }

  /* sm screens */
  @media (max-width: 900px) {
    .app { grid-template-columns: 1fr; }
    .auth-shell { grid-template-columns: 1fr; }
    .auth-side { display: none; }
    .content { padding: 20px 16px 60px; }
    .topbar { padding: 14px 16px; }

    /* Hamburger button visible only on mobile */
    .mobile-menu-btn { display: inline-flex; }

    /* Sidebar becomes a drawer — hidden by default, slides in when [data-open] */
    .sidebar {
      position: fixed;
      top: 0;
      left: 0;
      bottom: 0;
      width: min(288px, 84vw);
      z-index: 99;
      transform: translateX(-100%);
      transition: transform 220ms cubic-bezier(.2,.8,.2,1);
      box-shadow: var(--shadow-lg);
      height: 100vh;
    }
    .sidebar[data-open="true"] {
      transform: translateX(0);
    }
    .sidebar-backdrop[data-open="true"] {
      display: block;
    }
    /* Lock body scroll when drawer open */
    body[data-drawer-open="true"] {
      overflow: hidden;
    }
    /* Hide presence pill on small screens — saves space in topbar */
    .topbar .presence { display: none; }
    /* Hide "Wyloguj" text on small — keep icon-button via existing logout in sidebar footer */
    .topbar .logout-text { display: none; }
  }

  /* tweaks-side small tweaks */
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--line-strong); border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--ink-3); }
</style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="src/icons.jsx"></script>
  <script type="text/babel" src="src/data.jsx"></script>
  <script type="text/babel" src="src/components.jsx"></script>
  <script type="text/babel" src="src/sections.jsx"></script>
  <script type="text/babel" src="src/sections2.jsx"></script>
  <script type="text/babel" src="src/app.jsx"></script>
</body>
</html>
